<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高階地震物理學互動教程 (Advanced Seismophysics)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #f8fafc; color: #334155; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .math-block { background-color: #f1f5f9; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; overflow-x: auto; border-left: 4px solid #3b82f6; color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.05); }
        
        /* 1. 地震波動畫樣式 */
        .animate-seismic-wave {
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: drawWave 2.5s ease-out forwards;
        }
        @keyframes drawWave {
            to { stroke-dashoffset: 0; }
        }

        /* 2. 建築共振動畫樣式 */
        @keyframes sway-fast {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes sway-slow {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
            100% { transform: rotate(0deg); }
        }
        .resonance-high { animation: sway-fast 0.3s ease-in-out infinite; transform-origin: bottom center; }
        .resonance-low { animation: sway-slow 1.5s ease-in-out infinite; transform-origin: bottom center; }
        
        /* 3. 斷層錯動動畫樣式 */
        .fault-strain { transition: all 1s ease-in-out; }
        .fault-snap { animation: snap-shake 0.4s ease-out; }
        @keyframes snap-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 10px); }
            50% { transform: translate(10px, -10px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const topics = [
            { id: 1, title: "1. 地震學研究範疇", icon: "globe" },
            { id: 2, title: "2. 幾何震波與觀測模型", icon: "activity" },
            { id: 3, title: "3. Hazard 危害與 Risk 風險", icon: "alert-triangle" },
            { id: 4, title: "4. 震波能量衰減物理機制", icon: "trending-down" },
            { id: 5, title: "5. 地震危害度評估", icon: "map" },
            { id: 6, title: "6. 結構共振與頻譜響應", icon: "bar-chart-2" },
            { id: 7, title: "7. 土壤液化之有效應力機制", icon: "droplet" },
            { id: 8, title: "8. 預報 (Forecasting) vs. 預測", icon: "calendar" },
            { id: 9, title: "9. 彈性回跳與 Seismic Gap", icon: "scissors" },
            { id: 10, title: "10. 地震前兆與預測物理機制", icon: "search" },
            { id: 11, title: "11. 矩張量分解與核爆監測", icon: "crosshair" },
        ];

        // 針對不一致的檔名建立精確的對應字典 (處理 .png 前的空格問題)
        const exactFileNames = {
            "1.1-1": "Fig.%201.1-1%20.png",
            "1.1-2": "Fig.%201.1-2%20.png",
            "1.1-3": "Fig.%201.1-3.png",
            "1.1-4": "Fig.%201.1-4.png",
            "1.1-5": "Fig.%201.1-5.png",
            "1.2-3": "Fig.%201.2-3.png",
            "1.2-5": "Fig.%201.2-5.png",
            "1.2-6": "Fig.%201.2-6%20.png",
            "1.2-14": "Fig.%201.2-14.png",
            "1.2-15": "Fig.%201.2-15.png",
            "1.2-16": "Fig.%201.2-16.png",
            "1.2-18": "Fig.%201.2-18.png",
            "1.2-19": "Fig.%201.2-19%20.png"
        };

        // 使用 raw.githubusercontent.com 以確保載入的是純圖片而非 HTML 網頁
        const getImageUrl = (id) => `https://raw.githubusercontent.com/1280duck/Chapter-1-of-Seismology/main/${exactFileNames[id]}`;

        // 具有錯誤處理與加載樣式的圖片元件
        const SeismicImage = ({ id, alt }) => {
            const [hasError, setHasError] = useState(false);
            
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [hasError]);

            return (
                <div className="w-full bg-white rounded-lg border border-slate-200 flex flex-col items-center justify-center my-6 shadow-sm overflow-hidden">
                    {!hasError ? (
                        <img 
                            src={getImageUrl(id)} 
                            alt={alt} 
                            className="w-full h-auto max-h-[600px] object-contain bg-slate-50"
                            onError={() => setHasError(true)} 
                        />
                    ) : (
                        <div className="p-12 flex flex-col items-center justify-center text-slate-400 w-full bg-slate-50">
                            <i data-lucide="image-off" className="w-12 h-12 mb-3"></i>
                            <span className="text-sm font-medium text-slate-500">圖片載入失敗，請確認 GitHub 檔名</span>
                            <span className="text-xs mt-2 text-slate-400 text-center break-all px-4">{getImageUrl(id)}</span>
                        </div>
                    )}
                    <div className="p-3 w-full bg-slate-100 border-t border-slate-200 text-center text-sm text-slate-700 font-bold">
                        {alt}
                    </div>
                </div>
            );
        };

        // --- 動畫組件 1: 地震波 ---
        const InteractiveWave = () => {
            const [trigger, setTrigger] = useState(0);
            return (
                <div 
                    className="w-full h-56 bg-white rounded-xl overflow-hidden relative flex flex-col items-center justify-center border border-slate-200 my-8 shadow-sm cursor-pointer hover:shadow-md transition-shadow group"
                    onClick={() => setTrigger(prev => prev + 1)}
                    title="點擊畫面重新觸發地震波"
                >
                    <div className="absolute top-4 left-5 text-sm font-bold text-blue-600 flex items-center">
                        <i data-lucide="mouse-pointer-click" className="w-4 h-4 mr-2"></i>
                        點擊此區域觸發地震波模擬 (P波與S波)
                    </div>
                    <svg width="100%" height="100%" viewBox="0 0 1000 200" preserveAspectRatio="none" key={trigger} className="mt-8">
                        <line x1="0" y1="100" x2="1000" y2="100" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="5,5" />
                        <path 
                            d="M 0,100 L 100,100 
                               L 110,80 L 120,120 L 130,70 L 140,130 L 150,90 L 160,110 L 200,100 
                               L 250,100 L 270,30 L 300,180 L 330,20 L 370,160 L 410,40 L 450,140 L 500,60 L 550,120 L 600,80 L 650,110 L 700,95 L 750,105 L 800,100 
                               L 1000,100"
                            fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinejoin="round" className="animate-seismic-wave" 
                        />
                        <text x="125" y="50" fill="#64748b" fontSize="14" fontWeight="bold">P波 (縱波，波速快)</text>
                        <text x="350" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">S波 (橫波/剪力波，破壞力強)</text>
                    </svg>
                    <div className="absolute bottom-3 right-4 text-xs text-slate-400 group-hover:text-blue-500 transition-colors">點擊畫面重播動畫</div>
                </div>
            );
        };

        // --- 動畫組件 2: 結構共振 ---
        const InteractiveResonance = () => {
            const [earthquakeType, setEarthquakeType] = useState('none'); // 'highFreq', 'lowFreq', 'none'

            return (
                <div className="w-full bg-slate-100 rounded-xl p-6 my-8 border border-slate-200 shadow-inner text-center">
                    <h4 className="font-bold text-slate-700 mb-4 flex justify-center items-center">
                        <i data-lucide="activity" className="w-5 h-5 mr-2 text-blue-500"></i>
                        互動模擬：場址效應與結構共振
                    </h4>
                    <div className="flex justify-center space-x-4 mb-8">
                        <button 
                            onClick={() => setEarthquakeType('highFreq')}
                            className="px-4 py-2 bg-blue-100 text-blue-700 font-semibold rounded shadow hover:bg-blue-200 transition-colors border border-blue-300">
                            發出高頻地震波 (淺源/近震)
                        </button>
                        <button 
                            onClick={() => setEarthquakeType('lowFreq')}
                            className="px-4 py-2 bg-red-100 text-red-700 font-semibold rounded shadow hover:bg-red-200 transition-colors border border-red-300">
                            發出低頻地震波 (盆地效應/遠震)
                        </button>
                        <button 
                            onClick={() => setEarthquakeType('none')}
                            className="px-4 py-2 bg-slate-200 text-slate-600 font-semibold rounded shadow hover:bg-slate-300 transition-colors">
                            停止震動
                        </button>
                    </div>

                    <div className="flex items-end justify-center space-x-12 h-64 border-b-4 border-slate-400 pb-1 relative">
                        {/* 矮樓 (高頻共振) */}
                        <div className={`w-16 bg-gradient-to-t from-slate-400 to-slate-300 border-2 border-slate-500 rounded-t flex flex-col justify-end p-1 space-y-1 ${earthquakeType === 'highFreq' ? 'resonance-high' : ''}`} style={{height: '80px'}}>
                            <div className="w-full h-4 bg-slate-100 opacity-50"></div>
                            <div className="w-full h-4 bg-slate-100 opacity-50"></div>
                        </div>
                        {/* 中樓 */}
                        <div className="w-16 bg-gradient-to-t from-blue-400 to-blue-300 border-2 border-blue-500 rounded-t flex flex-col justify-end p-1 space-y-1" style={{height: '150px'}}>
                            <div className="w-full h-4 bg-blue-100 opacity-50"></div>
                            <div className="w-full h-4 bg-blue-100 opacity-50"></div>
                            <div className="w-full h-4 bg-blue-100 opacity-50"></div>
                            <div className="w-full h-4 bg-blue-100 opacity-50"></div>
                        </div>
                        {/* 高樓 (低頻共振) */}
                        <div className={`w-16 bg-gradient-to-t from-red-400 to-red-300 border-2 border-red-500 rounded-t flex flex-col justify-end p-1 space-y-1 ${earthquakeType === 'lowFreq' ? 'resonance-low' : ''}`} style={{height: '240px'}}>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                            <div className="w-full h-4 bg-red-100 opacity-50"></div>
                        </div>
                    </div>
                    <div className="flex justify-center space-x-12 mt-2 text-sm font-bold text-slate-500">
                        <div className="w-16 text-center">矮房<br/>$T_n \approx 0.2s$</div>
                        <div className="w-16 text-center">中樓房<br/>$T_n \approx 1.0s$</div>
                        <div className="w-16 text-center">超高層<br/>$T_n \approx 3.0s$</div>
                    </div>
                </div>
            );
        };

        // --- 動畫組件 3: 彈性回跳理論 ---
        const InteractiveRebound = () => {
            const [stage, setStage] = useState(0); // 0: 原狀, 1: 應變累積, 2: 破裂
            
            let d1 = "M 200,50 L 200,250"; // 基準線
            let strokeColor = "#3b82f6";
            
            if (stage === 1) {
                d1 = "M 150,50 Q 200,150 250,250"; // 彎曲變形
                strokeColor = "#eab308";
            } else if (stage === 2) {
                d1 = "M 150,50 L 150,150 M 250,150 L 250,250"; // 斷開錯位
                strokeColor = "#ef4444";
            }

            return (
                <div className="w-full bg-white rounded-xl p-6 my-8 border border-slate-200 shadow-sm text-center">
                    <h4 className="font-bold text-slate-700 mb-4">互動模擬：彈性回跳理論 (Elastic Rebound)</h4>
                    
                    <div className={`relative h-64 bg-slate-50 border border-slate-200 rounded overflow-hidden flex justify-center items-center ${stage===2 ? 'fault-snap' : ''}`}>
                        <svg width="400" height="300">
                            {/* 地表背景裝飾 */}
                            <rect x="0" y="0" width="400" height="300" fill="#f8fafc" />
                            {/* 斷層線 */}
                            <line x1="0" y1="150" x2="400" y2="150" stroke="#94a3b8" strokeWidth="4" strokeDasharray="10,10" />
                            {/* 應變標記線 */}
                            <path d={d1} fill="none" stroke={strokeColor} strokeWidth="8" strokeLinecap="round" className="fault-strain" />
                            
                            {/* 應力箭頭 */}
                            {stage === 1 && (
                                <g className="fault-strain opacity-50">
                                    <path d="M 50,100 L 100,100 L 90,90 M 100,100 L 90,110" fill="none" stroke="#64748b" strokeWidth="3"/>
                                    <path d="M 350,200 L 300,200 L 310,190 M 300,200 L 310,210" fill="none" stroke="#64748b" strokeWidth="3"/>
                                </g>
                            )}
                            {/* 地震波爆炸圖示 */}
                            {stage === 2 && (
                                <circle cx="200" cy="150" r="30" fill="rgba(239, 68, 68, 0.4)" className="animate-ping" />
                            )}
                        </svg>
                    </div>

                    <div className="flex justify-center space-x-4 mt-6">
                        <button onClick={() => setStage(0)} className={`px-4 py-2 font-semibold rounded shadow transition-colors ${stage===0 ? 'bg-slate-300 text-slate-800' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            1. 原始狀態
                        </button>
                        <button onClick={() => setStage(1)} className={`px-4 py-2 font-semibold rounded shadow transition-colors ${stage===1 ? 'bg-yellow-400 text-yellow-900' : 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200'}`}>
                            2. 應變累積 (板塊擠壓)
                        </button>
                        <button onClick={() => setStage(2)} className={`px-4 py-2 font-semibold rounded shadow transition-colors ${stage===2 ? 'bg-red-500 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}`}>
                            3. 破裂與回跳 (地震發生)
                        </button>
                    </div>
                </div>
            );
        };

        // ================= 各章節內容 =================
        const Content1 = () => (
            <div>
                <h2 className="text-3xl font-bold text-blue-800 mb-6 border-b border-slate-200 pb-2">地震學的物理與數學範疇</h2>
                <p className="mb-4 leading-relaxed text-slate-700 text-lg">
                    地震學並非單純描述地球震動，而是建構在連續介質力學（Continuum Mechanics）與彈性動力學（Elastodynamics）上的嚴謹科學。其核心研究範疇可分為三大支柱：
                </p>
                
                <InteractiveWave />

                <ul className="list-disc pl-6 space-y-4 mb-6 text-slate-700">
                    <li><strong className="text-blue-700 text-lg">震波傳播理論 (Wave Propagation Theory)：</strong><br/>探討彈性波（P波、S波、表面波與地球自由震盪）在非均勻、非彈性（Anelastic）及各向異性（Anisotropic）介質中的行為。這涉及解 Navier-Cauchy 運動方程式。</li>
                    <li><strong className="text-blue-700 text-lg">震源物理 (Source Physics)：</strong><br/>將地震斷層視為破裂力學（Fracture Mechanics）的展現。我們利用矩張量（Moment Tensor）與運動學模型（Kinematic modeling）來反演斷層滑移分佈與破裂方向性效應（Directivity）。</li>
                    <li><strong className="text-blue-700 text-lg">地球內部構造影像 (Earth Structure Imaging)：</strong><br/>利用觀測到的震波走時（Travel time）與波形，透過逆推理論（Inverse Problem, 例如地震層析成像 Seismic Tomography）重構地函與地核的密度及速度分佈。</li>
                </ul>
            </div>
        );

        const Content2 = () => (
            <div>
                <h2 className="text-3xl font-bold text-blue-800 mb-6 border-b border-slate-200 pb-2">觀測幾何與震波路徑解讀</h2>
                <p className="mb-4 text-slate-700 text-lg">圖 1.1-1 至 1.1-5 展示了地震學將地球內部參數化的基礎幾何與觀測方法：</p>
                
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.1-1：幾何示意圖</h3>
                    <p className="text-slate-600 mb-4">定義了震源（Source）、傳播介質（Medium）與接收站（Receiver）。地震圖（Seismogram）是震源時間函數與介質脈衝響應的卷積（Convolution）： {"$u(t) = s(t) * g(t) * i(t)$"}，其中 {"$i(t)$"} 為儀器響應。</p>
                    <SeismicImage id="1.1-1" alt="圖 1.1-1 地震實驗的幾何示意圖" />
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.1-2：射線路徑彎曲</h3>
                    <p className="text-slate-600 mb-4">根據 Snell's Law 的廣義形式（射線參數 {"$p = \\frac{r \\sin i}{v} = constant$"}），因為地球內部波速隨深度增加，震波射線會產生折射，路徑呈現向地表彎曲的特徵。</p>
                    <SeismicImage id="1.1-2" alt="圖 1.1-2 地震波在地球內部彎曲射線路徑" />
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.1-3：地震圖震相 (Phases)</h3>
                    <p className="text-slate-600 mb-4">展示了 P, pP, PP, S 及 Rayleigh 表面波。時間差（如 pP-P）是精確推算震源深度（Focal depth）的關鍵觀測量。</p>
                    <SeismicImage id="1.1-3" alt="圖 1.1-3 長週期垂直分量地震圖" />
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.1-4：核函邊界反射</h3>
                    <p className="text-slate-600 mb-4">顯示了 ScS 波（S波向下傳遞並在地核-地函邊界 CMB 反射）。多次反射波（如 ScS2, ScS3）為 CMB 的阻抗對比（Impedance contrast）提供了強有力的物理約束。</p>
                    <SeismicImage id="1.1-4" alt="圖 1.1-4 多重地核反射波 ScS" />
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.1-5：反射震測 (Reflection Seismology)</h3>
                    <p className="text-slate-600 mb-4">透過人工震源製造垂直入射波，利用共中點疊加（Common Midpoint Stacking）技術增強訊噪比，是探勘地殼淺層幾何構造的標準做法。</p>
                    <SeismicImage id="1.1-5" alt="圖 1.1-5 反射地震勘探方法示意圖" />
                </div>
            </div>
        );

        const Content3 = () => (
            <div>
                <h2 className="text-3xl font-bold text-blue-800 mb-6 border-b border-slate-200 pb-2">Seismic Hazard (危害) 與 Seismic Risk (風險) 之嚴格區別</h2>
                <p className="mb-4 text-slate-700 text-lg">在工程地震學與政策制定中，混淆 Hazard 與 Risk 是嚴重的錯誤。兩者在物理與統計上的定義截然不同：</p>
                
                <div className="bg-white border-l-4 border-blue-500 p-6 rounded shadow-sm mb-6">
                    <h3 className="text-xl font-bold text-blue-700 mb-2">Seismic Hazard (地震危害度)</h3>

                    <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                        <h4 className="font-bold text-blue-700 mb-2">地殼變形與應變監測</h4>
                        <p className="text-sm text-slate-600">利用 GPS、InSAR 或鑽孔應變儀（Borehole strainmeter）監測斷層帶的非震滑移（Aseismic slip）或地表隆起。</p>
                    </div>
                </div>

                <div className="bg-slate-800 text-slate-300 p-6 rounded-lg shadow-inner">
                    <p className="font-bold text-white flex items-center mb-2">
                        <i data-lucide="info" className="w-5 h-5 mr-2"></i>加州 Parkfield 預測實驗的教訓
                    </p>
                    <p className="text-sm italic">
                        儘管部署了上述所有高精度儀器，原預測應於 1988±5 年發生的地震，卻遲至 2004 年才發生，且未觀測到任何明顯的短期前兆。這顯示地球的非均質性極大干擾了前兆的系統性觀測。
                    </p>
                </div>
            </div>
        );

        const Content11 = () => (
            <div>
                <h2 className="text-3xl font-bold text-blue-800 mb-6 border-b border-slate-200 pb-2">矩張量分解與核子試爆的地震學監測</h2>
                <p className="mb-4 text-slate-700 text-lg">地震學是國際《全面禁止核子試驗條約》(CTBT) 的核心監測技術。區分天然地震與地下核爆的關鍵，在於<strong>震源物理機制</strong>的根本差異。我們透過地震矩張量（Seismic Moment Tensor, {"$M_{ij}$"}）進行數學分解：</p>
                
                <div className="math-block">
                    {"$$M_{ij} = M^{iso}_{ij} + M^{dev}_{ij}$$"}
                </div>
                
                <div className="flex flex-col md:flex-row gap-6 mb-8 mt-6">
                    <div className="flex-1 bg-white p-6 rounded-lg shadow-sm border-t-4 border-green-500">
                        <h4 className="font-bold text-slate-800 mb-2">天然地震 (Earthquake)</h4>
                        <p className="text-sm text-slate-600">本質為剪切斷層滑動（Shear faulting）。其張量的各向同性部分（Isotropic component, {"$M^{iso}$"}）趨近於零；主要由偏張量（Deviatoric component, {"$M^{dev}$"}）中的雙力偶（Double-Couple）主導。</p>
                    </div>
                    <div className="flex-1 bg-white p-6 rounded-lg shadow-sm border-t-4 border-orange-500">
                        <h4 className="font-bold text-slate-800 mb-2">地下核爆 (Nuclear Explosion)</h4>
                        <p className="text-sm text-slate-600">本質為體積膨脹。產生巨大的各向同性分量（即對角線跡 trace {" > 0"}），幾乎不產生純剪切錯動。</p>
                    </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.2-18：當量推估 (Yield Estimation)</h3>
                    <p className="text-slate-600 mb-4">利用體波規模 {"$m_b$"}推估核爆當量（Yield, {"$Y$"}），經驗公式為 {"$m_b = C + 0.75 \\log Y$"}。由於不同地質區域（如 Nevada vs. Kazakhstan）體波衰減係數 {"$C$"} 不同，必須精確校正場址效應。</p>
                    <SeismicImage id="1.2-18" alt="圖 1.2-18 蘇聯地下核試爆當量歷史紀錄" />
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">圖 1.2-19：波形特徵與 $m_b : M_s$ 判別法</h3>
                    <ul className="list-disc pl-6 space-y-2 text-slate-600 mb-4">
                        <li><strong>波形差異：</strong>天然地震產生強烈 S波與表面波。核爆產生極強 P波，缺乏產生強烈 S波的物理條件。</li>
                        <li><strong>規模判別：</strong>將體波規模（{"$m_b$"}）繪於 X軸，表面波規模（{"$M_s$"}）繪於 Y軸。天然地震落在高 {"$M_s$"} 區；核爆偏向高 {"$m_b$"}、低 {"$M_s$"}，形成完美的統計分離線。</li>
                    </ul>
                    <SeismicImage id="1.2-19" alt="圖 1.2-19 天然地震與核爆波形及規模散佈圖" />
                </div>
            </div>
        );

        const App = () => {
            const [activeTopic, setActiveTopic] = useState(1);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                // Ensure MathJax re-typesets equations when content changes
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log(err.message));
                }
            }, [activeTopic]);

            const renderContent = () => {
                switch(activeTopic) {
                    case 1: return <Content1 />;
                    case 2: return <Content2 />;
                    case 3: return <Content3 />;
                    case 4: return <Content4 />;
                    case 5: return <Content5 />;
                    case 6: return <Content6 />;
                    case 7: return <Content7 />;
                    case 8: return <Content8 />;
                    case 9: return <Content9 />;
                    case 10: return <Content10 />;
                    case 11: return <Content11 />;
                    default: return <Content1 />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-800">
                    {/* Sidebar (Light Theme) */}
                    <div className="w-1/4 min-w-[280px] bg-white border-r border-slate-200 flex flex-col shadow-lg z-10">
                        <div className="p-6 border-b border-slate-100 bg-slate-50">
                            <h1 className="text-xl font-black text-blue-800 tracking-wide">
                                震源物理與波動理論
                            </h1>
                            <p className="text-slate-500 text-sm mt-1 font-medium">Advanced Seismophysics</p>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
                            {topics.map(topic => (
                                <button
                                    key={topic.id}
                                    onClick={() => setActiveTopic(topic.id)}
                                    className={`w-full text-left px-4 py-3 rounded-lg flex items-center transition-all duration-200 group ${
                                        activeTopic === topic.id 
                                        ? 'bg-blue-600 shadow-md text-white font-bold' 
                                        : 'hover:bg-slate-100 text-slate-600 hover:text-blue-700'
                                    }`}
                                >
                                    <i data-lucide={topic.icon} className={`w-5 h-5 flex-shrink-0 mr-3 transition-colors ${
                                        activeTopic === topic.id ? 'text-white' : 'text-slate-400 group-hover:text-blue-500'
                                    }`}></i>
                                    <span className="text-sm tracking-wide leading-tight">{topic.title}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content (Light Theme) */}
                    <div className="flex-1 overflow-y-auto custom-scrollbar relative scroll-smooth bg-slate-50">
                        <div className="max-w-4xl mx-auto px-10 py-12 relative z-0">
                            <div className="glass-panel rounded-2xl p-10 shadow-lg border-t-4 border-blue-600">
                                {renderContent()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
